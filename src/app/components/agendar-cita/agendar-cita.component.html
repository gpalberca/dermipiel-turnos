<div class="page-container">
  <div class="form-card">
    <div class="form-header">
      <h1>📅 Agendar Cita</h1>
      <p>Completa el formulario y nos pondremos en contacto contigo</p>
    </div>

    @if (exito()) {
      <div class="alert-exito">
        ✅ ¡Cita agendada exitosamente! Pronto te contactaremos para confirmar.
        <a routerLink="/">Volver al inicio</a>
      </div>
    }

    @if (error()) {
      <div class="alert-error">⚠️ {{ error() }}</div>
    }

    @if (!exito()) {
      <div class="form-group">
        <label>Nombre completo *</label>
        <input type="text" [(ngModel)]="cita.nombre_paciente" placeholder="Tu nombre completo" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="cita.email" placeholder="tu@email.com" />
        </div>
        <div class="form-group">
          <label>Teléfono</label>
          <input type="tel" [(ngModel)]="cita.telefono" placeholder="+593 99 999 9999" />
        </div>
      </div>

      <div class="form-group">
        <label>Tratamiento *</label>
        <select [(ngModel)]="cita.tratamiento_id">
          <option [value]="0">Selecciona un tratamiento</option>
          @for (t of tratamientos(); track t.id) {
            <option [value]="t.id">{{ t.nombre }} — ${{ t.precio }} ({{ t.duracion_minutos }} min)</option>
          }
        </select>
      </div>

      <div class="form-group">
        <label>Fecha y hora *</label>
        <input type="datetime-local" [(ngModel)]="cita.fecha_hora" />
      </div>

      <button class="btn-submit" (click)="enviarCita()" [disabled]="enviando()">
        {{ enviando() ? 'Agendando...' : 'Confirmar Cita' }}
      </button>
    }
  </div>
</div>
