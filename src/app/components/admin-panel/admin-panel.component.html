<div class="dp dp-admin-container">
  <div class="dp-tab-bar">
    <button class="dp-tab-button" [class.active]="activeTab() === 'citas'"
            (click)="setTab('citas')">Citas</button>
    <button class="dp-tab-button" [class.active]="activeTab() === 'tratamientos'"
            (click)="setTab('tratamientos')">Tratamientos</button>
    <button class="dp-tab-button" [class.active]="activeTab() === 'horarios'"
            (click)="setTab('horarios')">Horarios</button>
  </div>
  <div class="dp-tab-content">
    @if (activeTab() === 'citas') { <app-admin-citas></app-admin-citas> }
    @if (activeTab() === 'tratamientos') { <app-admin-tratamientos></app-admin-tratamientos> }
    @if (activeTab() === 'horarios') { <app-admin-horarios></app-admin-horarios> }
  </div>
</div>
